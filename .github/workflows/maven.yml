name: Java CI - Build and Publish

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/java/**'
      - '.github/workflows/maven.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/java/**'
      - '.github/workflows/maven.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/java

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: src/java/pom.xml

    - name: Configure Maven settings.xml
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<'EOF'
        <settings>
          <servers>
            <server>
              <id>github</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
            <server>
              <id>github-getinsign</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.INSIGN_PACKAGES_TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF

    - name: Build and Test
      run: mvn -B clean verify
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INSIGN_PACKAGES_TOKEN: ${{ secrets.INSIGN_PACKAGES_TOKEN }}

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: src/java/target/surefire-reports/*.xml
        reporter: java-junit

    - name: Publish to GitHub Packages
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      run: mvn -B deploy -DskipTests
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INSIGN_PACKAGES_TOKEN: ${{ secrets.INSIGN_PACKAGES_TOKEN }}
