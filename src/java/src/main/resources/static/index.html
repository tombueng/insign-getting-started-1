<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inSign API - Getting Started</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { padding-bottom: 160px; }
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1030;
                       background: #1e293b; color: #e2e8f0; font-size: 0.82rem; border-top: 2px solid #3b82f6; }
        .status-bar .status-section { padding: 6px 12px; }
        .status-bar .label { color: #94a3b8; font-weight: 600; }
        .status-bar .badge-signed { background: #22c55e; }
        .status-bar .badge-unsigned { background: #ef4444; }
        .status-bar .badge-completed { background: #22c55e; }
        .status-bar .badge-incomplete { background: #f59e0b; }
        .response-card { margin-bottom: 8px; }
        .response-card .card-header { padding: 4px 10px; font-size: 0.82rem; }
        .response-card .card-body { padding: 8px; }
        .response-card pre { white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; margin: 0; }
        .response-card .timestamp { color: #6b7280; font-size: 0.75rem; }
        .btn-action { margin: 2px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: #6b7280; font-weight: 700;
                          letter-spacing: 0.05em; margin-top: 12px; margin-bottom: 4px; }
        .alert-toast { position: fixed; top: 70px; right: 20px; z-index: 2000; min-width: 300px; }
        .webhook-event { font-size: 0.78rem; padding: 3px 8px; border-left: 3px solid #3b82f6;
                          margin-bottom: 2px; background: rgba(59,130,246,0.08); }
        .webhook-event .event-id { font-weight: 600; color: #60a5fa; }
        .webhook-event .event-time { color: #94a3b8; font-size: 0.7rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-pen"></i> inSign API - Getting Started
            </span>
            <span class="text-light" id="version-badge"></span>
        </div>
    </nav>

    <div id="alert-area"></div>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Left column: Actions -->
            <div class="col-md-4 col-lg-3">

                <button class="btn btn-primary w-100 mb-3" id="btn-create" onclick="createSession()">
                    <i class="bi bi-plus-circle"></i> Create Session
                </button>

                <div id="session-actions" style="display:none">
                    <div class="section-title">Session Info</div>
                    <div class="d-flex flex-wrap">
                        <button class="btn btn-sm btn-outline-secondary btn-action" onclick="apiGet('/api/session/status', 'Status')">
                            <i class="bi bi-info-circle"></i> Status</button>
                        <button class="btn btn-sm btn-outline-secondary btn-action" onclick="apiGet('/api/session/checkstatus', 'Check Status')">
                            <i class="bi bi-arrow-repeat"></i> Check Status</button>
                        <button class="btn btn-sm btn-outline-secondary btn-action" onclick="apiGet('/api/session/metadata', 'Session Data')">
                            <i class="bi bi-file-earmark-text"></i> Session Data</button>
                        <button class="btn btn-sm btn-outline-info btn-action" onclick="getOwnerLink()">
                            <i class="bi bi-link-45deg"></i> Owner Link</button>
                    </div>

                    <div class="section-title">External Signing</div>
                    <div class="card card-body p-2 mb-2" id="invite-card">
                        <div class="mb-1">
                            <input type="email" class="form-control form-control-sm" id="email1" placeholder="Email Signer 1">
                        </div>
                        <div class="mb-1">
                            <input type="email" class="form-control form-control-sm" id="email2" placeholder="Email Signer 2">
                        </div>
                        <div class="mb-1">
                            <select class="form-select form-select-sm" id="delivery" onchange="togglePhoneFields()">
                                <option value="link">Link only</option>
                                <option value="email">Email</option>
                                <option value="sms">SMS</option>
                            </select>
                        </div>
                        <div id="phone-fields" style="display:none">
                            <input type="tel" class="form-control form-control-sm mb-1" id="phone1" placeholder="Phone Signer 1">
                            <input type="tel" class="form-control form-control-sm mb-1" id="phone2" placeholder="Phone Signer 2">
                        </div>
                        <button class="btn btn-sm btn-success w-100" onclick="inviteExtern()">
                            <i class="bi bi-send"></i> Send Invitations</button>
                    </div>
                    <div class="d-flex flex-wrap">
                        <button class="btn btn-sm btn-outline-secondary btn-action" onclick="apiGet('/api/extern/users', 'Extern Users')">
                            <i class="bi bi-people"></i> Extern Users</button>
                        <button class="btn btn-sm btn-outline-secondary btn-action" onclick="apiGet('/api/extern/infos', 'Extern Infos')">
                            <i class="bi bi-info-square"></i> Extern Infos</button>
                        <button class="btn btn-sm btn-outline-warning btn-action" onclick="apiPost('/api/extern/revoke', null, 'Revoke Invites')">
                            <i class="bi bi-x-circle"></i> Revoke</button>
                        <button class="btn btn-sm btn-outline-secondary btn-action" onclick="apiPost('/api/extern/reminder', null, 'Reminder')">
                            <i class="bi bi-bell"></i> Reminder</button>
                    </div>

                    <div class="section-title">Documents</div>
                    <div class="d-flex flex-wrap">
                        <button class="btn btn-sm btn-outline-primary btn-action" onclick="download('/api/documents/download')">
                            <i class="bi bi-download"></i> Download ZIP</button>
                        <button class="btn btn-sm btn-outline-primary btn-action" onclick="download('/api/audit/download')">
                            <i class="bi bi-file-pdf"></i> Audit Report</button>
                    </div>

                    <div class="section-title mt-3">Danger Zone</div>
                    <button class="btn btn-sm btn-outline-danger" onclick="purgeSession()">
                        <i class="bi bi-trash"></i> Purge Session</button>
                </div>
            </div>

            <!-- Right column: Response history -->
            <div class="col-md-8 col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <small class="text-muted">Responses</small>
                    <button class="btn btn-sm btn-outline-secondary py-0" onclick="$('#response-list').empty()">Clear All</button>
                </div>
                <div id="response-list"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Session:</span>
                <span id="sb-session">-</span>
                <span class="ms-2 label">User:</span>
                <span id="sb-userid">-</span>
                <span class="ms-2 label">TAN:</span>
                <span id="sb-tan" class="text-info">-</span>
                <span class="ms-2 label">Completed:</span>
                <span id="sb-completed" class="badge badge-incomplete">-</span>
                <span class="ms-2" id="sb-poll-indicator"></span>
            </div>
        </div>
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Signatures:</span>
                <span id="sb-sig-summary">-</span>
                <span class="ms-2 label">Mandatory:</span>
                <span id="sb-mandatory">-</span>
                <span class="ms-2 label">Optional:</span>
                <span id="sb-optional">-</span>
                <span class="ms-3 label">Docs:</span>
                <span id="sb-docs">-</span>
            </div>
        </div>
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Signature Fields:</span>
                <span id="sb-fields"></span>
            </div>
        </div>
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Step:</span>
                <span id="sb-process-step" class="text-info">-</span>
                <span class="ms-2 label">Needed:</span>
                <span id="sb-sigs-needed">-</span>
                <span class="ms-2 label">Done:</span>
                <span id="sb-sigs-done">-</span>
                <span class="ms-2 label">Extern:</span>
                <span id="sb-extern">-</span>
            </div>
        </div>
        <!-- Webhook events row -->
        <div class="d-flex flex-wrap" id="sb-webhook-row" style="display:none !important">
            <div class="status-section flex-fill">
                <span class="label"><i class="bi bi-broadcast"></i> Webhooks:</span>
                <span id="sb-webhooks"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    var sessionActive = false;
    var pollTimer = null;
    var evtSource = null;
    var webhookEvents = [];
    var MAX_WEBHOOK_EVENTS = 10;

    function timeStr() {
        return new Date().toLocaleTimeString();
    }

    // -- Init --
    $(function() {
        $.get('/api/version').done(function(d) {
            $('#version-badge').text('v' + d.version);
        });
        connectSSE();
    });

    // -- SSE --
    function connectSSE() {
        if (evtSource) evtSource.close();
        evtSource = new EventSource('/api/events');
        evtSource.addEventListener('status-change', function(e) {
            var data = JSON.parse(e.data);
            updateStatusBar(data.status);
        });
        evtSource.addEventListener('webhook', function(e) {
            var data = JSON.parse(e.data);
            addWebhookEvent(data);
            updateStatusBar(data.status);
        });
        evtSource.onerror = function() {
            // EventSource auto-reconnects; no need to show repeated errors
        };
    }

    function addWebhookEvent(data) {
        var eventId = (data.event && data.event.eventid) || 'UNKNOWN';
        webhookEvents.unshift({ eventId: eventId, time: timeStr(), data: data });
        if (webhookEvents.length > MAX_WEBHOOK_EVENTS) webhookEvents.pop();

        // Show webhook row in status bar
        $('#sb-webhook-row').css('display', '').removeClass('d-none');

        // Render events
        var html = '';
        for (var i = 0; i < webhookEvents.length; i++) {
            var evt = webhookEvents[i];
            html += '<span class="webhook-event">'
                + '<span class="event-id">' + evt.eventId + '</span> '
                + '<span class="event-time">' + evt.time + '</span>'
                + '</span> ';
        }
        $('#sb-webhooks').html(html);

        // Also add a response card for the webhook
        addResponseCard('Webhook: ' + eventId, data, false);
    }

    // -- Polling --
    function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(pollStatus, 5000);
        pollStatus();
    }

    var backendDown = false;

    function pollStatus() {
        if (!sessionActive) return;
        $('#sb-poll-indicator').html('<i class="bi bi-arrow-repeat spin"></i>');
        $.get('/api/session/status').done(function(d) {
            if (backendDown) {
                backendDown = false;
                showAlert('Backend reconnected', 'success');
                $('#sb-poll-indicator').text('');
            }
            updateStatusBar(d);
        }).fail(function(xhr) {
            if (!backendDown && xhr.status === 0) {
                backendDown = true;
                showAlert('Backend not reachable - polling paused until reconnected', 'warning');
            }
            $('#sb-poll-indicator').html(backendDown ? '<i class="bi bi-exclamation-triangle text-warning"></i> offline' : '');
        });
        $.get('/api/session/checkstatus').done(function(d) {
            updateCheckStatus(d);
            $('#sb-poll-indicator').text('');
        }).fail(function() {
            // already handled above
        });
    }

    function updateStatusBar(status) {
        // Session info
        var sid = status.sessionid || status.sessionId || '-';
        $('#sb-session').text(sid.length > 14 ? sid.substring(0, 14) + '...' : sid);
        $('#sb-userid').text(status.userid || '-');
        $('#sb-tan').text(status.tan || '-');

        // Completed flag
        var completed = status.sucessfullyCompleted || false;
        $('#sb-completed').text(completed ? 'YES' : 'NO')
            .removeClass('badge-completed badge-incomplete')
            .addClass(completed ? 'badge badge-completed' : 'badge badge-incomplete');

        // Signature counts
        var totalSigFields = status.numberOfSignaturesFields || 0;
        var mandatoryFields = status.numberOfMandatorySignatureFields || 0;
        var mandatorySigs = status.numberOfMandatorySignatures || 0;
        var optionalFields = status.numberOfOptionalSignatureFields || 0;
        var optionalSigs = status.numberOfOptionalSignatures || 0;

        // Count signed from signaturFieldsStatusList
        var sigFields = status.signaturFieldsStatusList || [];
        var signedCount = 0;
        var fieldHtml = '';
        for (var i = 0; i < sigFields.length; i++) {
            var f = sigFields[i];
            var signed = f.signed || false;
            if (signed) signedCount++;
            var icon = signed
                ? '<i class="bi bi-check-circle-fill text-success"></i>'
                : (f.mandatory ? '<i class="bi bi-circle text-danger"></i>' : '<i class="bi bi-circle text-warning"></i>');
            var mLabel = f.mandatory ? '<span class="text-danger">*</span>' : '';
            fieldHtml += icon + ' ' + (f.displayname || f.name || '?') + mLabel
                + ' <small class="text-muted">(' + (f.role || '?') + ')</small> ';
        }

        $('#sb-sig-summary').text(signedCount + ' / ' + totalSigFields + ' signed');
        $('#sb-mandatory').text(mandatorySigs + ' sigs / ' + mandatoryFields + ' fields');
        $('#sb-optional').text(optionalSigs + ' sigs / ' + optionalFields + ' fields');
        $('#sb-fields').html(fieldHtml || '-');

        // Documents
        var docs = status.documents || [];
        var docHtml = '';
        for (var d = 0; d < docs.length; d++) {
            if (d > 0) docHtml += ', ';
            docHtml += (docs[d].displayname || docs[d].docid || '?');
        }
        $('#sb-docs').text(docHtml || '-');
    }

    function updateCheckStatus(status) {
        $('#sb-process-step').text(status.processStep || '-');
        var needed = status.numberOfSignaturesNeeded;
        var done = status.numberOfSignaturesNeededDone;
        $('#sb-sigs-needed').text(needed != null ? needed : '-');
        $('#sb-sigs-done').text(done != null ? (done + (needed != null ? ' / ' + needed : '')) : '-');
        var ext = status.extern;
        $('#sb-extern').html(ext ? '<span class="badge badge-signed">YES</span>' : '<span class="badge badge-unsigned">NO</span>');
    }

    // -- Response card management --
    function addResponseCard(title, data, isError) {
        var json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        var textClass = isError ? 'text-danger' : 'text-light';
        var borderClass = isError ? 'border-danger' : '';
        var $card = $('<div class="card response-card ' + borderClass + '">'
            + '<div class="card-header d-flex justify-content-between align-items-center bg-dark text-light">'
            + '<span>' + $('<span>').text(title).html() + '</span>'
            + '<span class="timestamp">' + timeStr() + '</span>'
            + '</div>'
            + '<div class="card-body bg-dark p-2">'
            + '<pre class="' + textClass + ' bg-dark p-1 rounded mb-0"></pre>'
            + '</div></div>');
        // Use .text() to safely escape content
        $card.find('pre').text(json);
        $('#response-list').prepend($card);
    }

    // -- API helpers --
    function apiGet(url, title) {
        $.get(url).done(function(data) {
            if (data && data.error) {
                addResponseCard(title || url, data.message || 'Unknown error', true);
                return;
            }
            addResponseCard(title || url, data, false);
        }).fail(function(xhr) { handleError(xhr, title || url); });
    }

    function apiPost(url, data, title) {
        $.ajax({ url: url, method: 'POST', contentType: 'application/json',
                 data: data ? JSON.stringify(data) : null
        }).done(function(resp) {
            if (resp && resp.error) {
                addResponseCard(title || url, resp.message || 'Unknown error', true);
                return;
            }
            addResponseCard(title || url, resp, false);
        }).fail(function(xhr) { handleError(xhr, title || url); });
    }

    function handleError(xhr, title) {
        if (xhr.status === 0) {
            addResponseCard(title, 'Connection failed - is the server running on port 8090?', true);
            showAlert('Connection failed', 'danger');
            return;
        }
        var msg = 'HTTP ' + xhr.status + ' ' + (xhr.statusText || 'Error');
        var detail = msg;
        if (xhr.responseText) {
            try {
                var body = JSON.parse(xhr.responseText);
                msg = body.message || msg;
                if (body.responseBody) {
                    try {
                        detail = msg + '\n\n' + JSON.stringify(JSON.parse(body.responseBody), null, 2);
                    } catch(e) {
                        detail = msg + '\n\n' + body.responseBody;
                    }
                } else {
                    detail = msg;
                }
            } catch(e) {
                detail = msg + '\n\n' + xhr.responseText;
            }
        }
        addResponseCard(title, detail, true);
        showAlert(msg, 'danger');
    }

    function showAlert(message, type) {
        var id = 'alert-' + Date.now();
        var $alert = $('<div class="alert alert-dismissible alert-toast fade show"></div>')
            .addClass('alert-' + type)
            .attr('id', id)
            .text(message)
            .append('<button type="button" class="btn-close" data-bs-dismiss="alert"></button>');
        $('#alert-area').append($alert);
        setTimeout(function() { $('#' + id).alert('close'); }, 5000);
    }

    // -- Actions --
    function createSession() {
        $('#btn-create').prop('disabled', true).html('<i class="bi bi-hourglass-split"></i> Creating...');
        $.post('/api/session/create').done(function(data) {
            sessionActive = true;
            addResponseCard('Create Session', data, false);
            $('#session-actions').slideDown();
            $('#btn-create').html('<i class="bi bi-plus-circle"></i> Create New Session');
            showAlert('Session created: ' + (data.sessionid || ''), 'success');
            startPolling();
        }).fail(function(xhr) {
            handleError(xhr, 'Create Session');
        }).always(function() {
            $('#btn-create').prop('disabled', false);
        });
    }

    function inviteExtern() {
        var data = {
            email1: $('#email1').val(),
            email2: $('#email2').val(),
            delivery: $('#delivery').val(),
            phone1: $('#phone1').val(),
            phone2: $('#phone2').val()
        };
        apiPost('/api/extern/invite', data, 'Invite Extern');
    }

    function getOwnerLink() {
        $.get('/api/owner-link').done(function(data) {
            addResponseCard('Owner Link', data, false);
            if (data.url) {
                window.open(data.url, '_blank');
            }
        }).fail(function(xhr) { handleError(xhr, 'Owner Link'); });
    }

    function download(url) {
        window.location.href = url;
    }

    function purgeSession() {
        if (!confirm('Purge current session? This cannot be undone.')) return;
        $.ajax({ url: '/api/session/purge', method: 'DELETE' }).done(function(data) {
            sessionActive = false;
            addResponseCard('Purge Session', data, false);
            $('#session-actions').slideUp();
            $('#sb-session').text('-');
            $('#sb-completed').text('-').removeClass('badge-completed badge-incomplete');
            $('#sb-sig-summary').text('-');
            $('#sb-fields').text('-');
            if (pollTimer) clearInterval(pollTimer);
            showAlert('Session purged', 'warning');
        }).fail(function(xhr) { handleError(xhr, 'Purge Session'); });
    }

    function togglePhoneFields() {
        $('#phone-fields').toggle($('#delivery').val() === 'sms');
    }
    </script>
</body>
</html>
