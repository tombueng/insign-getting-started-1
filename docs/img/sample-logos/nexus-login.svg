<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 13 505 104" width="1515" height="312">
  <defs>
    <linearGradient id="nxl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="nxl-sep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="33%" stop-color="#00BCD4"/>
      <stop offset="66%" stop-color="#8BC34A"/>
      <stop offset="100%" stop-color="#FF5722"/>
    </linearGradient>
  </defs>
  <!-- Icon area background -->
  <rect x="8" y="15" width="100" height="100" rx="16" fill="url(#nxl-bg)"/>
  <!-- Overlapping translucent circles - larger -->
  <circle cx="44" cy="50" r="22" fill="#E91E63" fill-opacity="0.7"/>
  <circle cx="66" cy="50" r="22" fill="#00BCD4" fill-opacity="0.7"/>
  <circle cx="40" cy="72" r="22" fill="#8BC34A" fill-opacity="0.7"/>
  <circle cx="64" cy="72" r="22" fill="#FF5722" fill-opacity="0.7"/>
  <!-- Central glow -->
  <circle cx="54" cy="61" r="7" fill="#ffffff" fill-opacity="0.15"/>
  <circle cx="54" cy="61" r="3.5" fill="#ffffff" fill-opacity="0.45"/>
  <!-- Connecting lines -->
  <line x1="44" y1="50" x2="66" y2="50" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="44" y1="50" x2="40" y2="72" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="66" y1="50" x2="64" y2="72" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="40" y1="72" x2="64" y2="72" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="44" y1="50" x2="64" y2="72" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="66" y1="50" x2="40" y2="72" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Company name large with colored accents -->
  <text x="130" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="1.5">
    <tspan fill="#E91E63">N</tspan><tspan fill="#ECEFF1">exus</tspan>
    <tspan fill="#00BCD4" dx="8">G</tspan><tspan fill="#ECEFF1">rou</tspan><tspan fill="#8BC34A">p</tspan>
  </text>
  <!-- Subtitle -->
  <text x="130" y="72" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#B0BEC5" letter-spacing="3" font-weight="300">
    CONNECTED FUTURES
  </text>
  <!-- Multicolor separator -->
  <rect x="130" y="82" width="220" height="2.5" rx="1.25" fill="url(#nxl-sep)"/>
  <!-- Colored dots + tagline -->
  <circle cx="130" cy="99" r="3" fill="#E91E63"/>
  <circle cx="139" cy="99" r="3" fill="#00BCD4"/>
  <circle cx="148" cy="99" r="3" fill="#8BC34A"/>
  <circle cx="157" cy="99" r="3" fill="#FF5722"/>
  <text x="168" y="103" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#78909C" letter-spacing="0.5">
    Venture Capital · M&amp;A Advisory · Growth Partners
  </text>
</svg>