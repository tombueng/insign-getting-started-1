<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="90" height="90">
  <defs>
    <linearGradient id="nxg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
  </defs>
  <rect width="30" height="30" rx="6" fill="url(#nxg-bg)"/>
  <!-- Overlapping translucent circles -->
  <circle cx="12" cy="11" r="6" fill="#E91E63" fill-opacity="0.75"/>
  <circle cx="19" cy="11" r="6" fill="#00BCD4" fill-opacity="0.75"/>
  <circle cx="10" cy="18" r="6" fill="#8BC34A" fill-opacity="0.75"/>
  <circle cx="18" cy="18" r="6" fill="#FF5722" fill-opacity="0.75"/>
  <!-- Central node glow -->
  <circle cx="15" cy="14.5" r="2.5" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="15" cy="14.5" r="1.2" fill="#ffffff" fill-opacity="0.6"/>
  <!-- Connecting lines between circles -->
  <line x1="12" y1="11" x2="19" y2="11" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="12" y1="11" x2="10" y2="18" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="19" y1="11" x2="18" y2="18" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="10" y1="18" x2="18" y2="18" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.3"/>
</svg>