  <!-- Cross bar -->
  <line x1="39" y1="33" x2="61" y2="33" stroke="url(#hmAnc)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Flukes -->
  <path d="M34 48 C34 54 41 58 50 55" fill="none" stroke="url(#hmAnc)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M66 48 C66 54 59 58 50 55" fill="none" stroke="url(#hmAnc)" stroke-width="1.8" stroke-linecap="round"/>
