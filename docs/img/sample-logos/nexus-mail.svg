<svg xmlns="http://www.w3.org/2000/svg" viewBox="2 2 451 76" width="1353" height="228">
  <defs>
    <linearGradient id="nxm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
  </defs>
  <!-- Icon area background -->
  <rect x="4" y="4" width="72" height="72" rx="12" fill="url(#nxm-bg)"/>
  <!-- Overlapping translucent circles -->
  <circle cx="30" cy="30" r="16" fill="#E91E63" fill-opacity="0.7"/>
  <circle cx="46" cy="30" r="16" fill="#00BCD4" fill-opacity="0.7"/>
  <circle cx="26" cy="46" r="16" fill="#8BC34A" fill-opacity="0.7"/>
  <circle cx="44" cy="46" r="16" fill="#FF5722" fill-opacity="0.7"/>
  <!-- Central glow -->
  <circle cx="37" cy="38" r="5" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="37" cy="38" r="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <!-- Connecting lines -->
  <line x1="30" y1="30" x2="46" y2="30" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="30" y1="30" x2="26" y2="46" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="46" y1="30" x2="44" y2="46" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="26" y1="46" x2="44" y2="46" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Company name with colored accents -->
  <text x="102" y="38" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" font-weight="700" letter-spacing="1">
    <tspan fill="#E91E63">N</tspan><tspan fill="#ECEFF1">exus</tspan>
    <tspan fill="#00BCD4" dx="6">G</tspan><tspan fill="#ECEFF1">rou</tspan><tspan fill="#8BC34A">p</tspan>
  </text>
  <!-- Colored dots as accents -->
  <circle cx="102" cy="54" r="2.5" fill="#E91E63"/>
  <circle cx="110" cy="54" r="2.5" fill="#00BCD4"/>
  <circle cx="118" cy="54" r="2.5" fill="#8BC34A"/>
  <circle cx="126" cy="54" r="2.5" fill="#FF5722"/>
  <!-- Tagline -->
  <text x="136" y="58" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#90A4AE" letter-spacing="0.5">
    Venture Capital · M&amp;A Advisory · Growth Partners
  </text>
</svg>